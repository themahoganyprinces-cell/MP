{% extends "CMD.html" %}
{% block head %}
<title>Contact Us</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CMDContactstyle.css') }}">
{% endblock %}
{% block content %} 
    <main id="contactform">
        <h3>Contact Us</h3>
        <form>
            <div>
                <label class="prompt" for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name">
            </div>
            <br/>
            <div>
                <label class="prompt" for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email">
            </div>
            <br/>
            <div>
                <label class="prompt" for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your message"></textarea>
            </div>
            <br/>
            <button type="submit">Send</button>
            <br/>
            <link rel="icon" href="{{ url_for('static', filename='PNG/CMDlogo.png') }}">
        </form>
        <div id="socialmedia">
            <p>Join our community to see our latest work and updates!</p>
            <a href="https://www.instagram.com/crownmahoganydetailing?igsh=NGJwcmFyNTg5M2Y0&utm_source=qr"><img class="socialmedia_icon" src="{{ url_for('static', filename='PNG/instagram.jpeg') }}" alt="Instagram logo" width="75" height="75"></a>
            </p>
        </div>
    </main>
{% endblock %}
