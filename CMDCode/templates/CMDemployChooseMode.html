<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Crown Mahogany Detailing</title>
    <link rel="icon" href="{{ url_for('static', filename='PNG/CMDlogo.png') }}">
    <script src="https://kit.fontawesome.com/d303cba5a4.js" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #ccc;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .choose_logo {
            width: 72px;
            height: 72px;
            margin-bottom: 18px;
        }
        .choose_title {
            color: #FCBE28;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 6px;
            text-align: center;
        }
        .choose_sub {
            color: #555;
            font-size: 13px;
            margin-bottom: 40px;
            text-align: center;
        }

        .choose_cards {
            display: flex;
            gap: 20px;
        }

        .choose_card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 36px 40px;
            text-decoration: none;
            transition: border-color 0.2s, transform 0.15s;
            cursor: pointer;
            min-width: 180px;
        }
        .choose_card:hover {
            border-color: #FCBE28;
            transform: translateY(-2px);
        }

        .choose_card_icon {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .icon_manage { background: #2a1f00; color: #FCBE28; }
        .icon_work   { background: #0d2200; color: #5cb85c; }

        .choose_card_label {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
        .choose_card_desc {
            font-size: 12px;
            color: #555;
            text-align: center;
            line-height: 1.5;
        }

        .choose_greeting {
            font-size: 13px;
            color: #444;
            margin-top: 36px;
        }

        @media (max-width: 480px) {
            .choose_cards { flex-direction: column; }
        }
    </style>
</head>
<body>

    <img class="choose_logo"
         src="{{ url_for('static', filename='PNG/CMDlogo.png') }}"
         alt="CMD">

    <div class="choose_title">Welcome back, {{ employee.first_name }}.</div>
    <div class="choose_sub">What would you like to do today?</div>

    <div class="choose_cards">
        <a class="choose_card" href="{{ url_for('manage_employees') }}">
            <div class="choose_card_icon icon_manage">
                <i class="fa-solid fa-crown"></i>
            </div>
            <div class="choose_card_label">Manage</div>
            <div class="choose_card_desc">View employees, jobs,<br>pay rates &amp; inventory</div>
        </a>

        <a class="choose_card" href="{{ url_for('employee_dashboard') }}">
            <div class="choose_card_icon icon_work">
                <i class="fa-solid fa-hard-hat"></i>
            </div>
            <div class="choose_card_label">Work</div>
            <div class="choose_card_desc">Your jobs, schedule,<br>pay &amp; team feed</div>
        </a>
    </div>

    <div class="choose_greeting">Signed in as {{ employee.email }}</div>

</body>
</html>
