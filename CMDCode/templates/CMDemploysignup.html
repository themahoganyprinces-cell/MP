<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="{{ url_for('static', filename='PNG/CMDlogo.png') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='CMDstyle.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='CMDemploySignupstyle.css') }}">
        <script src="https://kit.fontawesome.com/d303cba5a4.js" crossorigin="anonymous"></script>
        <title>Employee Sign Up</title>
    </head>
    <body>
        <nav>
            <div id="navbrand">
                <img id="navicon" src="{{ url_for('static', filename='PNG/CMDlogo.png') }}" alt="Crown Mahogany Detailing logo" width="50" height="50">
            </div>
            <div id="navlinks">
                <a class="navbutton" id="Homebutton" href="{{ url_for('home') }}">Return to Home</a>
            </div>
        </nav>
        <div id="signupcontainer">
            {% if error %}
                <p>{{ error }}</p>
            {% else %}
                <h1>Employee Sign Up</h1>
                <form method="POST" action="{{ url_for('employee_signup', branch=branch, employee_number=employee_number) }}" enctype="multipart/form-data">
                    <label for="name">First Name:</label>
                    <input type="text" id="name" name="name" required placeholder="John">
                    <label for="lastname">Last Name:</label>
                    <input type="text" id="lastname" name="lastname" required placeholder="Doe">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                    <label for="Town/City">Town/City:</label>
                    <input type="text" id="Town/City" name="Town/City" required placeholder="Amityville">
                    <label for="state">State:</label>
                    <input type="text" id="state" name="state" required placeholder="NY">
                    <label for="professional">Professional Head Shot (clients will see this):</label>
                    <input type="file" id="professional" name="professional" accept="image/*">
                    <label for="avatar">Avatar (used between employees):</label>
                    <input type="file" id="avatar" name="avatar" accept="image/*">
                    <button type="submit">Sign Up</button>
                </form>
            {% endif %}
        </div>
    </body>
</html>
